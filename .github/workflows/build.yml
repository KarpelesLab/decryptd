name: Build

on:
  push:
    branches: ["**"]
  pull_request:
  # Allows release.yml to reuse this exact build matrix.
  workflow_call:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            bin: decryptd
            archive: decryptd-linux-x86_64.tar.gz
          - name: windows-x86_64
            os: windows-latest
            bin: decryptd.exe
            archive: decryptd-windows-x86_64.zip
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # The `gui` feature builds the system-tray UI. On Linux that needs GTK 3,
      # libxdo (cursor/X11 helper used by tray-icon) and an AppIndicator dev
      # package; Windows links these from the OS, so no extra packages there.
      - name: Install GUI build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev libxdo-dev libayatana-appindicator3-dev

      # Provides the link-time CUDA driver library: the libcuda.so stub on Linux and
      # cuda.lib on Windows. The runtime libcuda is the NVIDIA driver on the volunteer
      # machine; CI only needs it to resolve symbols at link time. build.rs picks up
      # the install via the CUDA_PATH the action exports.
      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda
        with:
          cuda: "12.6.0"

      - name: Build
        # Release binaries ship the system-tray GUI by default.
        run: cargo build --release --locked --features gui

      - name: Package (Linux → tar.gz)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          tar -czf "dist/${{ matrix.archive }}" -C target/release "${{ matrix.bin }}"

      - name: Package (Windows → zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "target/release/${{ matrix.bin }}" -DestinationPath "dist/${{ matrix.archive }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error
