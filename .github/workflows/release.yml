name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  # Reuse the exact same matrix that build.yml uses on every push.
  build:
    uses: ./.github/workflows/build.yml

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v4
        with:
          path: dist
          # Only our binaries — the CUDA toolkit action uploads its own log artifact.
          pattern: decryptd-*
          merge-multiple: true

      - name: Create / update release with binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/decryptd-*
          generate_release_notes: true
          fail_on_unmatched_files: true

  # Build the signed rsupd update package from this run's triple-named binary
  # artifacts and upload it to the dist host, so deployed workers auto-update to
  # this release. Needs the RSUPD_IDENTITY secret (base64 of the signing
  # identity); the channel is pinned to `master` to match what the binaries
  # embed as their default consumer channel.
  publish:
    name: Sign & publish update
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install rsupd CLI
        run: cargo install rsupd --locked --features _cli
      - name: Build signed package from CI binaries, sign, and upload
        env:
          GH_TOKEN: ${{ github.token }}
          RSUPD_IDENTITY: ${{ secrets.RSUPD_IDENTITY }}
        run: rsupd publish --ci --run ${{ github.run_id }} --channel master --yes

  # The headless -server build tracks its own `server` channel so console workers
  # auto-update to another console build, never the GTK-linked GUI binary on
  # `master`. Its binary isn't a triple-named CI artifact, so `--ci` can't stage it;
  # instead we drop it into target/<triple>/release/ and publish in local mode
  # (rsupd packages the existing binary — no recompile).
  publish-server:
    name: Sign & publish server update
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install rsupd CLI
        run: cargo install rsupd --locked --features _cli
      - name: Stage the headless server binary at its target path
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download ${{ github.run_id }} -n decryptd-linux-x86_64-server.tar.gz -D srv
          mkdir -p target/x86_64-unknown-linux-gnu/release
          tar -xzf srv/decryptd-linux-x86_64-server.tar.gz \
            -C target/x86_64-unknown-linux-gnu/release decryptd
      - name: Sign & publish to the `server` channel
        env:
          RSUPD_IDENTITY: ${{ secrets.RSUPD_IDENTITY }}
        run: rsupd publish --target x86_64-unknown-linux-gnu --channel server --yes
